name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx wxt prepare
      - run: npm run check
      - run: npm run zip:all

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*-chrome.zip
            dist/*-firefox.zip
            dist/*-edge.zip
            dist/*-sources.zip
          generate_release_notes: true
